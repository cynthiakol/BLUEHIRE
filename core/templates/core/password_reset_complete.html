{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete | BlueHire</title>
  <link rel="icon" href="{% static 'core/image/logo.png' %}" type="image/png">
  <link rel="stylesheet" href="{% static 'core/css/auth.css' %}">
  <style>
    .reset-container {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      padding: 30px 40px;
      border-radius: 14px;
      box-shadow: 0 5px 14px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { color: #28a745; }
    p { color: #555; font-size: 14px; }
    a {
      display: inline-block;
      margin-top: 15px;
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="reset-container">
    <img src="{% static 'core/image/logo.png' %}" alt="BlueHire Logo" width="80">
    <h2>Password Reset Successful</h2>
    <p>Your password has been updated. You can now sign in with your new credentials.</p>
    <a href="{% url 'signin_register' %}">Go to Sign In</a>
  </div>
</body>
</html>
