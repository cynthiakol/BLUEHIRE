{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password | BlueHire</title>
  <link rel="icon" href="{% static 'core/image/logo.png' %}" type="image/png">
  <link rel="stylesheet" href="{% static 'core/css/jobseeker_profile.css' %}">
  <style>
    body {
      background: #f3f5f9;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 40px;
      border-radius: 12px;
    }
    h2 { color: #0056b3; text-align: center; margin-bottom: 20px; }
    .btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(90deg, #007bff, #00a6ff);
      border: none;
      color: white;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover { background: #0056b3; }
    .btn-outline {
      display: block;
      text-align: center;
      color: #007bff;
      margin-top: 15px;
      text-decoration: none;
      font-weight: 500;
    }
    .btn-outline:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card" style="max-width:500px;margin:80px auto;">
    <h2>Change Password</h2>
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Save New Password</button>
    </form>

    {% if request.user.role == 'JobSeeker' %}
      <a href="{% url 'jobseeker_profile' %}" class="btn-outline">Back to Profile</a>
    {% elif request.user.role == 'Employer' %}
      <a href="{% url 'employer_profile' %}" class="btn-outline">Back to Dashboard</a>
    {% endif %}
  </div>
</body>
</html>
