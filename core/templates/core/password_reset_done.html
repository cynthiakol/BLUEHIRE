{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Sent | BlueHire</title>
  <link rel="icon" href="{% static 'core/image/logo.png' %}" type="image/png">
  <link rel="stylesheet" href="{% static 'core/css/auth.css' %}">
  <style>
    .reset-container {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      padding: 30px 40px;
      border-radius: 14px;
      box-shadow: 0 5px 14px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 { color: #28a745; }
    p { color: #555; font-size: 14px; }
    a { color: #007bff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="reset-container">
    <img src="{% static 'core/image/logo.png' %}" alt="BlueHire Logo" width="80">
    <h2>Check Your Email</h2>
    <p>We’ve sent password reset instructions to your email if it’s registered with BlueHire.</p>
    <p><a href="{% url 'signin_register' %}">Return to Sign In</a></p>
  </div>
</body>
</html>
