{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | BlueHire</title>
  <link rel="icon" href="{% static 'core/image/logo.png' %}" type="image/png">
  <link rel="stylesheet" href="{% static 'core/css/auth.css' %}">
  <style>
    .reset-container {
      max-width: 420px;
      margin: 80px auto;
      background: #fff;
      padding: 30px 40px;
      border-radius: 14px;
      box-shadow: 0 5px 14px rgba(0,0,0,0.1);
      text-align: center;
    }
    h2 {
      color: #007bff;
      margin-bottom: 10px;
    }
    p {
      color: #555;
      font-size: 14px;
    }
    form input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 15px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #0056b3; }
    a { color: #007bff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="reset-container">
    <img src="{% static 'core/image/logo.png' %}" alt="BlueHire Logo" width="80">
    <h2>Forgot Password</h2>
    <p>Enter your registered email address. We’ll send you a link to reset your password.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.email }}
      <button type="submit">Send Reset Link</button>
    </form>

    <p><a href="{% url 'signin_register' %}">Back to Sign In</a></p>
  </div>
</body>
</html>
