{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueHire | Verify OTP</title>
  <link rel="stylesheet" href="{% static 'core/css/auth.css' %}">
</head>
<body>

<div class="auth-layout">
  <section class="auth-form-card">
    <h2>Phone Verification</h2>
    <p>Enter the 6-digit code sent to your phone</p>

    <form method="POST" action="{% url 'verify_otp' %}">
      {% csrf_token %}
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="09XXXXXXXXX" required>
      </div>
      <div class="form-group">
        <label>OTP Code</label>
        <input type="text" name="otp" maxlength="6" placeholder="6-digit code" required>
      </div>

      <button type="submit" class="btn primary">Verify OTP</button>
    </form>

    <p class="switch">
      Didn’t receive it? <a href="{% url 'signin_register' %}">Resend OTP</a>
    </p>
  </section>
</div>

</body>
</html>
